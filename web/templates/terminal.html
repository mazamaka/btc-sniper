<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC SNIPER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
:root{--bg:#0a0a0a;--card:#111;--border:#1a1a1a;--text:#c8c8c8;--dim:#555;--green:#00ff41;--red:#ff3333;--blue:#4fc3f7;--yellow:#ffd740;--glow:rgba(0,255,65,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:900px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 16px}
.title{font-size:32px;font-weight:700;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 20px var(--glow),0 0 40px var(--glow);color:#fff}
.title2{font-size:28px;font-weight:700;letter-spacing:4px;color:var(--green);text-shadow:0 0 15px var(--glow)}
.wallet{font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:6px}
.status-line{margin-top:8px;font-size:12px;color:var(--dim)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--border);margin:16px 0;background:var(--card)}
.stat{padding:12px 16px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:22px;font-weight:600;margin-top:2px}
.chart-section{margin:16px 0}
.chart-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.chart-container{position:relative;border:1px solid var(--border);background:var(--card);height:200px;padding:8px}
.chart-label{position:absolute;right:12px;top:12px;text-align:right;z-index:2}
.chart-label .amount{font-size:20px;font-weight:600;color:#fff}
.chart-label .pct{font-size:14px;color:var(--green)}
canvas{width:100%!important;height:100%!important}
.tabs{display:flex;gap:0;margin:16px 0 0;flex-wrap:wrap}
.tab{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.tab:hover{color:var(--text);border-color:#333}
.tab.active{color:var(--green);border-color:var(--green);background:rgba(0,255,65,.05)}
.terminal{border:1px solid var(--border);border-top:none;background:var(--card);min-height:300px;max-height:500px;overflow-y:auto;padding:0}
.terminal-header{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;position:sticky;top:0;background:var(--card);z-index:1}
.terminal-status{color:var(--green);font-weight:600}
.terminal-body{padding:12px}
.log-entry{padding:10px 0;border-bottom:1px solid #0f0f0f}
.log-entry:last-child{border-bottom:none}
.log-pnl{font-size:14px;font-weight:600}
.log-pnl.positive{color:var(--green)}
.log-pnl.negative{color:var(--red)}
.log-detail{font-size:11px;color:var(--dim);margin-top:2px}
.log-result{font-size:13px;margin-top:4px}
.log-balance{font-size:12px;color:var(--dim);margin-top:2px}
.log-cost{font-size:12px;color:var(--dim)}
.log-market{font-size:12px;color:#888;margin-top:4px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}
.status-item{padding:10px;border:1px solid var(--border)}
.status-item .label{font-size:10px;color:var(--dim);text-transform:uppercase}
.status-item .value{font-size:16px;font-weight:500;margin-top:4px}
.scan-entry{padding:8px 12px;border-bottom:1px solid #0f0f0f;font-size:12px;display:grid;grid-template-columns:60px 1fr 80px 80px;gap:8px;align-items:center}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
.btc-price{position:fixed;top:8px;right:16px;font-size:12px;color:var(--dim);z-index:100}
.btc-price .price{color:var(--yellow);font-weight:600}
</style>
</head>
<body>
<div class="btc-price">BTC <span class="price" id="btcPrice">--</span></div>
<div class="container">
  <div class="header">
    <div class="title">BTC SNIPER</div>
    <div class="title2">v1.0</div>
    <div class="wallet">PAPER TRADING &middot; POLYGON-USDC</div>
    <div class="status-line">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">CONNECTING...</span>
      <span id="clockTime" style="margin-left:12px"></span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">Balance</div><div class="stat-value" id="statBalance">$100.00</div></div>
    <div class="stat"><div class="stat-label">P&L</div><div class="stat-value" id="statPnl">+$0.00</div></div>
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-value" id="statTrades">0</div></div>
  </div>
  <div class="chart-section">
    <div class="chart-title">DEPOSIT GROWTH &middot; REAL-TIME</div>
    <div class="chart-container">
      <div class="chart-label"><div class="amount" id="chartAmount">$100</div><div class="pct" id="chartPct">+0.0%</div></div>
      <canvas id="equityChart"></canvas>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('snipe')" id="tab-snipe">&#9889; SNIPE</button>
    <button class="tab" onclick="showTab('scan')" id="tab-scan">SCAN</button>
    <button class="tab" onclick="showTab('status')" id="tab-status">STATUS</button>
    <button class="tab" onclick="showTab('log')" id="tab-log">LOG</button>
    <button class="tab" onclick="showTab('reset')" id="tab-reset">RESET</button>
  </div>
  <div class="terminal">
    <div class="terminal-header"><span>SNIPER TERMINAL</span><span class="terminal-status" id="termStatus">IDLE</span></div>
    <div class="terminal-body" id="termBody"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
var ws=null,portfolio={},equityData=[],tradesHistory=[],currentTab='snipe',chart=null,btcPrice=0;
function el(id){return document.getElementById(id)}
function ce(tag){var e=document.createElement(tag);return e}
function txt(e,t){e.textContent=t;return e}

function connect(){
  var proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(proto+'://'+location.host+'/ws');
  ws.onopen=function(){txt(el('statusText'),'LIVE');el('statusDot').style.background='var(--green)'};
  ws.onclose=function(){txt(el('statusText'),'DISCONNECTED');el('statusDot').style.background='var(--red)';setTimeout(connect,3000)};
  ws.onmessage=function(e){var msg=JSON.parse(e.data);handleEvent(msg.event,msg.data)};
}

function sendCmd(cmd){if(ws&&ws.readyState===1)ws.send(cmd)}

function handleEvent(event,data){
  if(event==='portfolio'){portfolio=data;updateStats()}
  else if(event==='price'){btcPrice=data.btc_price;txt(el('btcPrice'),'$'+btcPrice.toLocaleString())}
  else if(event==='equity_curve'){equityData=data;updateChart()}
  else if(event==='trades_history'){tradesHistory=data;if(currentTab==='snipe'||currentTab==='log')renderTab()}
  else if(event==='trade'){tradesHistory.unshift(data);if(currentTab==='snipe')renderTab()}
  else if(event==='resolution'){
    for(var i=0;i<tradesHistory.length;i++){
      if(tradesHistory[i].trade_id===data.trade_id){
        tradesHistory[i].result=data.result.toLowerCase();
        tradesHistory[i].pnl=data.pnl;tradesHistory[i].payout=data.payout;break;
      }
    }
    if(currentTab==='snipe'||currentTab==='log')renderTab();
  }
  else if(event==='scan'){txt(el('termStatus'),'SCAN #'+data.scan);setTimeout(function(){txt(el('termStatus'),'SNIPING')},2000)}
}

function updateStats(){
  txt(el('statBalance'),'$'+(portfolio.equity||100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}));
  var pnl=portfolio.total_pnl||0;
  var pnlEl=el('statPnl');
  txt(pnlEl,(pnl>=0?'+':'')+'\$'+Math.abs(pnl).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}));
  pnlEl.style.color=pnl>=0?'var(--green)':'var(--red)';
  txt(el('statTrades'),portfolio.total_trades||0);
  txt(el('chartAmount'),'$'+(portfolio.equity||100).toLocaleString(undefined,{maximumFractionDigits:0}));
  var pct=portfolio.pnl_pct||0;var pctEl=el('chartPct');
  txt(pctEl,(pct>=0?'+':'')+pct.toFixed(1)+'%');
  pctEl.style.color=pct>=0?'var(--green)':'var(--red)';
}

function updateChart(){
  if(!equityData.length)return;
  var labels=equityData.map(function(){return''});
  var values=equityData.map(function(d){return d.equity});
  if(chart){chart.data.labels=labels;chart.data.datasets[0].data=values;chart.update('none');return}
  var ctx=el('equityChart').getContext('2d');
  chart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{data:values,borderColor:'#fff',borderWidth:2,fill:true,backgroundColor:'rgba(255,255,255,0.03)',pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#fff',tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true,grid:{color:'rgba(255,255,255,0.03)',drawBorder:false},ticks:{color:'#333',font:{family:'JetBrains Mono',size:10},callback:function(v){return'$'+(v/1000>=1?(v/1000).toFixed(0)+'K':v.toFixed(0))}}}},interaction:{intersect:false,mode:'index'}}});
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  var tabEl=el('tab-'+tab);if(tabEl)tabEl.classList.add('active');
  renderTab();
}

function renderTab(){
  var body=el('termBody');while(body.firstChild)body.removeChild(body.firstChild);
  if(currentTab==='snipe')renderSnipe(body);
  else if(currentTab==='scan')renderScan(body);
  else if(currentTab==='status')renderStatus(body);
  else if(currentTab==='log')renderLog(body);
  else if(currentTab==='reset')renderReset(body);
}

function renderSnipe(body){
  if(!tradesHistory.length){var p=ce('div');p.style.cssText='padding:20px;color:var(--dim);text-align:center';txt(p,'Waiting for first scan...');body.appendChild(p);return}
  tradesHistory.slice(0,30).forEach(function(t){
    var entry=ce('div');entry.className='log-entry';
    // Normalize field names (WS event uses price/size, history uses entry_price/size_usd)
    var price=t.entry_price||t.price||0;
    var size=t.size_usd||t.size||0;
    var qty=t.quantity||(price>0?size/price:0);
    // P&L
    var pnlDiv=ce('div');pnlDiv.className='log-pnl '+((t.pnl||0)>=0?'positive':'negative');
    var edgePct=((t.edge||0)*100).toFixed(1);
    txt(pnlDiv,'P&L '+((t.pnl||0)>=0?'+':'')+'\$'+Math.abs(t.pnl||0).toFixed(2)+' ('+edgePct+'%)');
    entry.appendChild(pnlDiv);
    // Detail
    var detail=ce('div');detail.className='log-detail';
    txt(detail,qty.toFixed(0)+' '+t.side+' at '+(price*100).toFixed(1)+'c');
    entry.appendChild(detail);
    // Result
    if(t.result){
      var resultDiv=ce('div');resultDiv.className='log-result';
      var icon=t.result==='won'?'\u2713 ':'\u2717 ';
      var span=ce('span');span.style.color=t.result==='won'?'var(--green)':'var(--red)';
      txt(span,icon+(t.result==='won'?'Won':'Lost')+'  #'+t.trade_id);
      resultDiv.appendChild(span);entry.appendChild(resultDiv);
      var balDiv=ce('div');balDiv.className='log-balance';
      txt(balDiv,'Bal $'+(portfolio.balance||0).toLocaleString(undefined,{minimumFractionDigits:2}));
      entry.appendChild(balDiv);
      var costDiv=ce('div');costDiv.className='log-cost';
      txt(costDiv,'Cost $'+size.toFixed(2)+'  Payout $'+(t.payout||0).toFixed(2));
      entry.appendChild(costDiv);
    }else{
      var openDiv=ce('div');openDiv.className='log-result';
      var span2=ce('span');span2.style.color='var(--yellow)';
      txt(span2,'\u25CF Open  #'+t.trade_id);
      openDiv.appendChild(span2);entry.appendChild(openDiv);
    }
    var mktDiv=ce('div');mktDiv.className='log-market';txt(mktDiv,t.question);entry.appendChild(mktDiv);
    body.appendChild(entry);
  });
}

function renderScan(body){
  var p=ce('div');p.style.cssText='padding:12px;color:var(--dim);font-size:12px';
  txt(p,'BTC: $'+(btcPrice||'--').toLocaleString()+' | Scanning every 300s');
  body.appendChild(p);
  fetch('/api/markets').then(function(r){return r.json()}).then(function(markets){
    markets.forEach(function(m){
      var row=ce('div');row.className='scan-entry';
      var type=ce('span');type.style.fontWeight='600';
      type.style.color=(m.market_type==='above'||m.market_type==='reach')?'var(--green)':m.market_type==='below'?'var(--red)':'var(--text)';
      txt(type,m.market_type.toUpperCase());row.appendChild(type);
      var q=ce('span');q.style.fontSize='11px';txt(q,m.question.substring(0,60));row.appendChild(q);
      var price=ce('span');price.style.textAlign='right';txt(price,(m.yes_price*100).toFixed(1)+'c');row.appendChild(price);
      var days=ce('span');days.style.cssText='text-align:right;color:var(--dim)';txt(days,m.days_to_expiry.toFixed(1)+'d');row.appendChild(days);
      body.appendChild(row);
    });
  });
}

function renderStatus(body){
  var grid=ce('div');grid.className='status-grid';
  var items=[['Balance','$'+(portfolio.balance||0).toFixed(2)],['Equity','$'+(portfolio.equity||0).toFixed(2)],['Total P&L',(portfolio.total_pnl>=0?'+':'')+'\$'+(portfolio.total_pnl||0).toFixed(2)],['Return',(portfolio.pnl_pct>=0?'+':'')+(portfolio.pnl_pct||0).toFixed(2)+'%'],['Total Trades',portfolio.total_trades||0],['Open',portfolio.open_trades||0],['Wins',portfolio.wins||0],['Losses',portfolio.losses||0],['Win Rate',(portfolio.win_rate||0).toFixed(1)+'%'],['Exposure','$'+(portfolio.exposure||0).toFixed(2)],['BTC Price','$'+(btcPrice||0).toLocaleString()],['Strategy','Log-Normal + Kelly']];
  items.forEach(function(item){
    var div=ce('div');div.className='status-item';
    var label=ce('div');label.className='label';txt(label,item[0]);div.appendChild(label);
    var value=ce('div');value.className='value';txt(value,String(item[1]));
    if(item[0]==='Total P&L'||item[0]==='Return')value.style.color=(portfolio.total_pnl||0)>=0?'var(--green)':'var(--red)';
    div.appendChild(value);grid.appendChild(div);
  });
  body.appendChild(grid);
}

function renderLog(body){
  tradesHistory.forEach(function(t){
    var line=ce('div');line.style.cssText='padding:4px 8px;font-size:11px;border-bottom:1px solid #0f0f0f';
    var icon=t.result==='won'?'\u2713':t.result==='lost'?'\u2717':'\u25CF';
    var color=t.result==='won'?'var(--green)':t.result==='lost'?'var(--red)':'var(--yellow)';
    var iconSpan=ce('span');iconSpan.style.color=color;txt(iconSpan,icon+' #'+t.trade_id);line.appendChild(iconSpan);
    var info=ce('span');info.style.color='var(--dim)';
    var p=t.entry_price||t.price||0;var s=t.size_usd||t.size||0;
    txt(info,' | '+t.side+' '+(p*100).toFixed(1)+'c | $'+s.toFixed(2)+' | '+t.question.substring(0,50));
    line.appendChild(info);body.appendChild(line);
  });
}

function renderReset(body){
  var wrap=ce('div');wrap.style.cssText='padding:40px;text-align:center';
  var warn=ce('div');warn.style.cssText='color:var(--red);font-size:14px;margin-bottom:20px';
  txt(warn,'This will reset portfolio to $'+((portfolio.initial_balance||100).toFixed(2))+' and delete all trades.');
  wrap.appendChild(warn);
  var btn=ce('button');btn.style.cssText='background:var(--red);color:#000;border:none;padding:10px 30px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:700;letter-spacing:1px';
  txt(btn,'CONFIRM RESET');
  btn.onclick=function(){sendCmd('reset');showTab('snipe')};
  wrap.appendChild(btn);
  body.appendChild(wrap);
}

setInterval(function(){txt(el('clockTime'),new Date().toTimeString().substring(0,8))},1000);
connect();txt(el('termStatus'),'SNIPING');renderTab();
</script>
</body>
</html>
