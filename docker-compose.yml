services:
  btc-sniper:
    build: .
    container_name: btc-sniper
    restart: unless-stopped
    ports:
      - "8877:8877"
    volumes:
      - btc-sniper-data:/app/data
      - btc-sniper-logs:/app/logs
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8877/api/portfolio').raise_for_status()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  btc-sniper-data:
  btc-sniper-logs:
